# ════════════════════════════════════════════════════════════
# FlightSchedule — local development stack
# ════════════════════════════════════════════════════════════
# - db:  Postgres 16, bound to 127.0.0.1 ONLY (no external exposure)
# - web: Next.js dev server, bound to 0.0.0.0:3000 (externally accessible)
#
# Usage:
#   docker compose up        # start everything
#   docker compose up db     # only the database
#   docker compose down      # stop
#   docker compose logs -f web
# ════════════════════════════════════════════════════════════

services:
  db:
    image: postgres:16-alpine
    container_name: cavok-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cavok}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cavok_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cavok}
      TZ: Europe/Paris
      PGTZ: Europe/Paris
    ports:
      # 127.0.0.1 binding — DB is reachable only from the host machine,
      # never from the network. The `web` service connects via the docker
      # bridge network using hostname `db` instead.
      # Host port 5442 (not 5432) to stay clear of any other Postgres on
      # the host (e.g. the library app uses 5433 — we keep our own lane).
      - "127.0.0.1:5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cavok} -d ${POSTGRES_DB:-cavok}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: cavok-web:latest
    container_name: cavok-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Override DATABASE_URL to use the in-network db hostname
      DATABASE_URL: ${DATABASE_URL_INTERNAL}
      NODE_ENV: production
      TZ: Europe/Paris
      # next/server reads NEXTAUTH_URL for the canonical app origin
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    env_file:
      - .env
    ports:
      # Host port 6000 → container port 3000.
      # 0.0.0.0 binding — publicly reachable on this server.
      # Caddy proxies flightschedule.org → 127.0.0.1:6000.
      - "0.0.0.0:6000:3000"
    # No volumes mounted for the web service — the image is fully self-
    # contained. Source changes require `docker compose up -d --build`.

volumes:
  postgres_data:
    name: cavok_postgres_data
